name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags:
      # Маска для классического SemVer (v1.2.3)
      # Не пропустит v1.0-beta или просто произвольные строки
      - 'v[0-9]+.[0-9]+.[0-9]+' 
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Tests
        run: make unit-test

      - name: Calculate Coverage
        # Вытаскиваем только число процентов из отчета
        run: |
          export COVERAGE=$(go tool cover -func=test/coverage/unit.out | grep total | grep -RoE '[0-9]+\.[0-9]+')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Create Coverage Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: b0d91574542f919600a3af6e1c74223a
          filename: coverage.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          color: ${{ env.COVERAGE > 80 && 'green' || env.COVERAGE > 50 && 'yellow' || 'red' }}

  build:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare .env file
        run: |
          touch .env
          echo 'APP_NAME="swimming-search"' >> .env
          echo 'APP_VERSION="${{ github.ref_name }}"' >> .env
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: registry.alexiss.ru
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Используем github.ref_name для подстановки версии тега
          tags: |
            registry.alexiss.ru/swimming-search:${{ github.ref_name }}
            registry.alexiss.ru/swimming-search
          build-args: |
            VERSION=${{ github.ref_name }}
          # Использование кэша ускоряет повторные сборки
          cache-from: type=gha
          cache-to: type=gha,mode=max
